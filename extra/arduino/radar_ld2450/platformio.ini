; radar_ld2450 — HLK-LD2450 24GHz radar on an ESP32 USB-serial bridge to HPlayer2.
; Successor of ../Atom-prox (PIR), which failed in direct sun. Deliberately dumb:
; forwards raw LD2450 targets, takes no decision. All gating lives in the host
; `radar` interface (core/interfaces/radar.py).
;
; env:c3   = production target (ESP32-C3 mini, sealed IP55 boxes)
; env:atom = desk-test rig (M5 Atom Matrix) while waiting for the C3 minis

[env:c3]
platform = espressif32@^6.8
board = esp32-c3-devkitm-1        ; any ESP32-C3 board works — adjust if yours differs
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1          ; HW USB-Serial/JTAG CDC — survives crashes, no button dance to flash
    -DARDUINO_USB_CDC_ON_BOOT=1   ; `Serial` = the USB CDC link to the Pi
    -DPROTO_VERSION=1
    -DRADAR_RX=20                 ; LD2450 TX -> C3 GPIO20  (only wire needed for data)
    -DRADAR_TX=21                 ; C3 GPIO21 -> LD2450 RX  (unused unless configuring the sensor)
    -DLED_PIN=8                   ; onboard LED on most C3 minis (active-low)
    -DLED_ACTIVE_LOW=1

[env:atom]
; M5 Atom Matrix (ESP32-PICO-D4), LD2450 on the Grove port. USB is the CH9102
; converter (plain UART0), so no USB_MODE flags here. The 5x5 matrix plots the
; raw targets spatially — debug only, the production C3 box has no display.
platform = espressif32@^6.8
board = m5stack-atom
framework = arduino
monitor_speed = 115200
lib_deps = fastled/FastLED@^3.7
build_flags =
    -DPROTO_VERSION=1
    -DRADAR_RX=32                 ; LD2450 TX -> Atom G32 (Grove)
    -DRADAR_TX=26                 ; Atom G26 (Grove) -> LD2450 RX
    -DLED_PIN=27                  ; 5x5 SK6812 matrix data pin
    -DLED_MATRIX=1                ; spatial detection feedback on the matrix
