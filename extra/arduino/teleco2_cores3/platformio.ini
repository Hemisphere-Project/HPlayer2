; TELECO2 — HPlayer2 USB remote on M5Stack CoreS3
; protocol v1, see core/interfaces/teleco2.py header

[env:cores3]
; default: HW USB-Serial/JTAG CDC — port survives firmware crashes, trivial flashing.
; enumerates as Espressif 303a:1001 (matched by the host filter "HPlayer2|303a:1001")
platform = espressif32@^6.8
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPROTO_VERSION=1
lib_deps =
    m5stack/M5Unified@^0.2
    bblanchon/ArduinoJson@^7

[env:cores3-tinyusb]
; option: TinyUSB OTG with a clean "HPlayer2 Remote" product string.
; re-flash may require manual download mode (hold RST until the LED turns green).
extends = env:cores3
; the m5stack-cores3 board manifest injects -DARDUINO_USB_MODE=1: unflag it
; explicitly, our =0 below must not depend on -D ordering
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPROTO_VERSION=1
    -DUSB_PRODUCT='"HPlayer2 Remote"'
    -DUSB_MANUFACTURER='"KXKM"'
